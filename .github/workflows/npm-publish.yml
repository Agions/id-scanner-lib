name: 发布NPM包

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.6.0)'
        required: false
        default: ''
  push:
    branches: [main]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: 'https://registry.npmjs.org'

      - name: 安装pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: 获取pnpm缓存
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 安装依赖
        run: pnpm install

      - name: 构建
        run: pnpm run build

      - name: 发布到NPM
        if: success()
        run: npm publish --access public --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
