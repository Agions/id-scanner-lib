name: 发布NPM包

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.5.0)'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'src/**'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装依赖
        run: npm install --legacy-peer-deps

      - name: 构建
        run: npm run build

      - name: 发布到NPM
        if: success()
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          npm publish --access public
