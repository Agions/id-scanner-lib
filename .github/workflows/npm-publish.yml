name: 发布NPM包

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.6.0)'
        required: false
        default: ''
  push:
    branches: [main]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: 'https://registry.npmjs.org'

      - name: 安装依赖
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: 构建
        run: npx rimraf dist && npx rollup -c rollup.config.js

      - name: 发布到NPM
        if: success()
        run: npm publish --access public --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
